  - id: ultimate-test
    title: The Ultimate Test of Pi
    source_url: https://www.pi-world-ranking-list.com/index.php?page=ultimate
    body: >-
      On 07 September 2002, during the World Record Festival in Dessau, Germany, Jan van Koningsveld
      of Germany was the first to ever pass one of the most difficult tests ever, THE ULTIMATE TEST
      OF PI . Rules (German) His attempt was for the first 1,000 decimal places and he answered all
      of the 30 questions correctly. He needed 51 minutes and 40 seconds. Jan van Koningsveld (left)
      during his record attempt
    entries:
      - name: Jan van Koningsveld
        digits: '1000'
        date: '2002-09-07'
        time: 51 min 40 sec
        notes: Answered all 30 Ultimate Test of Pi questions correctly.
  - id: pi-permutation
    title: The Pi Permutation
    source_url: https://www.pi-world-ranking-list.com/index.php?page=pi-permutation
    body: >-
      Explanation: The Pi Permutation p (N, n, k) N: Know the first N digits of Pi. N is a multiple
      of 10, and we admit N = 10, N = 100, N = 5,000, N = 10,000. Example N = 10: Know the sequence
      1415926535. n: The task is to know n digits which are chosen at random. We admit n = 1, n = 2,
      and n = 10. Example n = 1: What is the digit no. 4? Answer: 5. Example n = 2: What is the
      double-digit no. 4? Answer: 65. Example n = 10: What is the ten-digit no. 4? Answer:
      5028841971. k: The number of questions to be answered. For N = 10 we admit only n = 1 and k =
      10. For N = 100 we admit n = 1 and k = 10 or k = 100. For N = 5,000 we admit n = 1, k = 10, k
      = 100, k = 500 / n = 2, k = 10, k = 100, k = 2,500 / n = 10, k = 10, k = 100, k = 500. For N =
      10,000 we admit n = 1, k = 10, k = 100, k = 10,000 / n = 2, k = 10, k = 100, k = 5,000 / n =
      10, k = 10, k = 100, k = 1,000. Offline: This memory sport uses a software which you can
      download for free on www.piworld.de. The count of the digits can be chosen to your liking from
      1 or from 0. For every question you are allowed one mistake, but not two mistakes. The mistake
      must be corrected immediately. Sport: The overall time needed to accomplish p (N,n,k) counts.


      Records: Records offline: P (N = 5,000, n = 2, k = 2,500) Ulrich Voigt, 2002, June 28 in
      Matthias-Claudius Gymnasium in Hamburg-Wandsbek. Time: 6h 5m. Ulrich Voigt, 2003, June 30 in
      Matthias-Claudius Gymnasium in Hamburg-Wandsbek. Time: 5h 40m. P (N = 100, n = 1, k = 100)
      Ulrich Voigt, 2006, Nov. 6 in Mathematicum Giessen at the Mental Calculation World Cup. Time:
      48,43 s. Ulrich Voigt, 2006, Nov. 6 in Mathematicum Giessen at the mental calculation
      worls-championship. Time: 48,43 s. Ulrich Voigt, 2009, July 31, University Hamburg at the
      German Memory Championships. Time: 44.25s Ulrich Voigt, 2011, April 12 in Matthias-Claudius
      Gymnasium in Hamburg-Wandsbek. Time: 42.14s. Ulrich Voigt, 2011, July 10 in RenMin DaXue,
      Beijing at the end of a lecture "From Matteo Ricci to modern Memory Sport". Time: 41.14s.
      Ulrich Voigt, 2011, Sep. 24 in Rome at the Speed Memory Championships. Time: 39.42s. Ulrich
      Voigt, 2013, October 6 in Lisboa at the Speed Memory World Championships. Time: 38.86s. Fabian
      Saal, 2015, May 23, in Wuerzburg, Germany, at the Sueddeutsche Gedaechtnismeisterschaft. Time:
      35.88 seconds Online: The "best 20" for these disciplines you can find on www.pi-sport.eu. You
      can register on this page and get a ranking. On this website you find more detailed
      information in several languages.
    entries:
      - name: Ulrich Voigt
        date: '2002-06-28'
        discipline: P(N=5000, n=2, k=2500)
        time: 6h 5m
      - name: Fabian Saal
