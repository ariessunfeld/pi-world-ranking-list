pages:
  - id: amazing-performances
    title: Amazing Performances
    source_url: https://www.pi-world-ranking-list.com/index.php?page=amazing
    body: >-
      Sim Pohann of Malaysia recited the first 67,053 digits of Pi with just 15 errors on 14 April
      1999. It took him 15 hours and 15 minutes. Dr. Yip Swe Chooi, also of Malaysia, Grandmaster of
      Memory, recited the first 60,000 digits of Pi with just 44 errors on 25 July 1998. It took him
      14 hours. Unfortunately both error lists are lost, so the exact positions of the first errors
      made are unknown. Therefore, both performances are no world records according to the Pi World
      Ranking List or the 'Guinness Book of Records'. OTHER AMAZING PERFORMANCES : Dave Turner
      recited the first 1,250 digits of Pi both forwards and backwards on 05 July 2005. James Smith
      from Australia recited the first 3,000 digits of Pi both forwards and backwards on 24 April
      2014. It took him 1 h 45 min forwards and 2 h 48 min backwards.
    entries:
      - name: Sim Pohann
        digits: '67053'
        date: '1999-04-14'
        notes: Recited with 15 errors; not a world record because exact error positions are unknown.
      - name: Dr. Yip Swe Chooi
        digits: '60000'
        date: '1998-07-25'
        notes: Recited with 44 errors; not a world record because exact error positions are unknown.
      - name: Dave Turner
        digits: '1250'
        date: '2005-07-05'
        notes: Recited digits forwards and backwards.
      - name: James Smith
        digits: '3000'
        date: '2014-04-24'
        notes: Recited digits forwards and backwards.
  - id: pi-matrix
    title: Pi Matrix Records
    source_url: https://www.pi-world-ranking-list.com/index.php?page=matrix
    body: >-
      Rules : Each line of PI is numbered and there are 50 digits on each line in blocks of five.
      The candidate is given a number of a line of PI and then has to either recite the line forward
      or backwards. Or he will be asked to name a certain digit on that line. He also may have to
      multiply two certain digits on different lines. The candidate has to answer 50 tests and get
      them all correct. On 09 October 1999, Creighton Carvello of England was able to pass all these
      tests on the first 10,050 digits of PI. His attempt took place at the Royal Holloway,
      University of London, Egham, Surrey, England. Two official witnesses were present. The
      following performances have not yet been verified : G. Uday Shankar, 7,000 digits Bishwaroop
      Roy Chowdhury, 4,200 digits Professor Aitkin, 2,000 digits EVEREST OF MEMORY TESTS Rules : The
      first 10,000 digits of Pi are divided into 2,000 5-digit blocks. The testers call out one of
      these 5-digit sequences, and the candidate must reply with the 5-digit numbers on either side
      of the number chosen. This happens 50 times. Ranking List: 1 Lars Christiansen 15 March 2024
      13 min 34,77 sec World Record 2024 2 Martin Nilsson 05 October 2019 14 min 33.60 sec World
      Record 2019 3 Kevin Horsley 14 March 2013 16 min 38.35 sec World Record 2013 4 Mark A. Nissen
      29 March 2019 16 min 51 sec 5 Mats Bergsten 12 February 2008 17 min 39 sec World Record 2008 6
      Jan Harms 27 July 2007 20 min 30 sec World Record 2007 7 Philip Bond 28 June 2004 29 min 51
      sec World Record 2004 8 Kevin Horsley 28 Aug 1999 39 min World Record 1999 9 Philip Bond 18
      May 1994 53 min World Record 1994 OLYMPUS MONS OF MEMORY TESTS Rules : The first 100,000
      digits of Pi are divided into 1,000 pages, containing 10 rows with 9 digits and 1 row with 10
      digits each. The testers call out one of these 9- or 10-digit sequences, and the candidate
      must reply with the 9- or 10-digit numbers on either side of the number chosen. This happens
      50 times. Jonas von Essen from Sweden was the first to pass this test on 10 March 2020 in a
      time of 33 minutes and 00,63 seconds.
    entries:
